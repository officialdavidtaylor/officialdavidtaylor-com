services:
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    ports:
      - "9000:9000" # S3 API (LAN)
      - "9001:9001" # MinIO console (LAN/admin only)

  # Optional: separate tunnel for public media subdomain (media.example.com).
  # Prefer a reverse proxy in front of MinIO if you need custom headers/caching behavior.
  # Remove this service if you run a centralized tunnel host elsewhere.
  cloudflared:
    image: cloudflare/cloudflared:2026.2.1
    container_name: cloudflared-media
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CF_TUNNEL_TOKEN_MEDIA}
    depends_on:
      - minio
    profiles: ["public-media"]

volumes:
  minio-data:
