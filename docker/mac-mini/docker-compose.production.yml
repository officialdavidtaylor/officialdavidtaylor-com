services:
  web:
    image: ${WEB_IMAGE}
    container_name: portfolio-web
    restart: unless-stopped
    depends_on:
      - strapi
    env_file:
      - .env.mac-mini
    environment:
      HOST: 0.0.0.0
      PORT: 4321
      STRAPI_URL: ${WEB_STRAPI_URL}
      STRAPI_PUBLIC_URL: ${WEB_STRAPI_PUBLIC_URL}
      STRAPI_API_TOKEN: ${WEB_STRAPI_API_TOKEN}
      STRAPI_FETCH_RETRIES: ${WEB_STRAPI_FETCH_RETRIES:-3}
      RECORDS_CACHE_TTL_SECONDS: ${WEB_RECORDS_CACHE_TTL_SECONDS:-3600}
      RECORDS_INVALIDATE_SECRET: ${WEB_RECORDS_INVALIDATE_SECRET}
    ports:
      - "127.0.0.1:${WEB_LOCAL_PORT:-4321}:4321"

  postgres:
    image: postgres:16-alpine
    container_name: portfolio-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-strapi}
      POSTGRES_USER: ${POSTGRES_USER:-strapi}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-strapi} -d ${POSTGRES_DB:-strapi}"]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: portfolio-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT:-9001}:9001"

  minio-init:
    image: minio/mc
    container_name: portfolio-minio-init
    depends_on:
      - minio
    restart: "no"
    entrypoint: /bin/sh
    command:
      - -c
      - >
        until mc alias set local http://minio:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD";
        do sleep 2; done &&
        mc mb --ignore-existing "local/$$S3_BUCKET" &&
        if [ "$$MINIO_BUCKET_PUBLIC" = "true" ]; then
          mc anonymous set public "local/$$S3_BUCKET";
        fi
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      MINIO_BUCKET_PUBLIC: ${MINIO_BUCKET_PUBLIC:-true}

  strapi:
    image: ${STRAPI_IMAGE}
    container_name: portfolio-strapi
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    env_file:
      - .env.mac-mini
    environment:
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_NAME: ${POSTGRES_DB:-strapi}
      DATABASE_USERNAME: ${POSTGRES_USER:-strapi}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
      S3_ENDPOINT: http://minio:9000
    ports:
      - "127.0.0.1:${STRAPI_LOCAL_PORT:-1337}:1337"

  cloudflared:
    image: ${CLOUDFLARED_IMAGE:-cloudflare/cloudflared:2026.2.1}
    container_name: portfolio-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate --config /etc/cloudflared/config.yml run
    environment:
      TUNNEL_METRICS: ${CLOUDFLARED_METRICS_BIND:-0.0.0.0:2000}
    depends_on:
      - minio
      - strapi
      - web
    ports:
      - "127.0.0.1:${CLOUDFLARED_METRICS_PORT:-2000}:2000"
    volumes:
      - ./cloudflared/config.yml:/etc/cloudflared/config.yml:ro
      - ./cloudflared/credentials:/etc/cloudflared/credentials:ro

volumes:
  postgres_data:
  minio_data:
