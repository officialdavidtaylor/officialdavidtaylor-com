name: Release Images

on:
  workflow_run:
    workflows:
      - Release Tag
    types:
      - completed

permissions:
  contents: read

env:
  IMAGE_NAMESPACE: officialdavidtaylor
  REGISTRY: registry.emfsoft.com

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Derive release version
        id: release
        run: |
          RELEASE_TAG="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" 'v*' | sort -V | tail -n 1)"

          if [ -z "$RELEASE_TAG" ]; then
            echo "No release tag points at ${{ github.event.workflow_run.head_sha }}; skipping image build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Strapi image
        if: ${{ steps.release.outputs.should_build == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/strapi-cms/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/strapi-cms:${{ steps.release.outputs.release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/strapi-cms:latest

      - name: Build and push web image
        if: ${{ steps.release.outputs.should_build == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/web:${{ steps.release.outputs.release_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/web:latest
