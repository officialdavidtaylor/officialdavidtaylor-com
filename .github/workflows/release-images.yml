name: Release Images

on:
  workflow_run:
    workflows:
      - Release Tag
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
  REGISTRY: ghcr.io
  WEB_IMAGE_NAME: officialdavidtaylor/officialdavidtaylor-com-web
  STRAPI_IMAGE_NAME: officialdavidtaylor/officialdavidtaylor-com-strapi-cms
  IMAGE_PLATFORMS: linux/arm64

jobs:
  build-and-push:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4
        with:
          platforms: arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Derive release version
        id: release
        run: |
          RELEASE_TAG="$(git tag --points-at "${{ github.event.workflow_run.head_sha }}" 'v*' | sort -V | tail -n 1)"

          if [ -z "$RELEASE_TAG" ]; then
            echo "No release tag points at ${{ github.event.workflow_run.head_sha }}; skipping image build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "should_build=true" >> "$GITHUB_OUTPUT"
          echo "release_version=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Build and push Strapi image
        if: ${{ steps.release.outputs.should_build == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/strapi-cms/Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.STRAPI_IMAGE_NAME }}:${{ steps.release.outputs.release_version }}
            ${{ env.REGISTRY }}/${{ env.STRAPI_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}

      - name: Build and push web image
        if: ${{ steps.release.outputs.should_build == 'true' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: ${{ env.IMAGE_PLATFORMS }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:${{ steps.release.outputs.release_version }}
            ${{ env.REGISTRY }}/${{ env.WEB_IMAGE_NAME }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.event.workflow_run.head_sha }}
